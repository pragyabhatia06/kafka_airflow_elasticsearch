services:
  mongo:
    image: mongo:7
    container_name: local-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: news-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo

  airflow-db:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.0
    container_name: airflow-init
    depends_on:
      - airflow-db
      - mongo
      - kafka
      - zookeeper
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      PYTHONPATH: /opt/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/project
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Airflow
        --lastname Admin
        --role Admin
        --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
      - kafka
      - zookeeper
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      PYTHONPATH: /opt/
      _PIP_ADDITIONAL_REQUIREMENTS: "pymongo feedparser requests python-dotenv kafka-python"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/project
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
      - kafka
      - zookeeper
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      PYTHONPATH: /opt/project
      _PIP_ADDITIONAL_REQUIREMENTS: "pymongo feedparser requests python-dotenv kafka-python"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/project
    command: scheduler

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: local-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: local-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CONFLUENT_SUPPORT_METRICS_ENABLE: 'false'

  mongo-consumer:
    build: .
    container_name: mongo-consumer
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
      - kafka
      - zookeeper
    command: python -m consumers.mongo_consumer

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: local-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  elastic-consumer:
    build: .
    container_name: elastic-consumer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: news_articles
      ELASTIC_CONSUMER_GROUP: elastic-news-consumer-group
    depends_on:
      - kafka
      - zookeeper
      - elasticsearch
    command: python -m consumers.elastic_consumer

volumes:
  mongo_data:
  airflow_postgres_data:
  elastic_data: